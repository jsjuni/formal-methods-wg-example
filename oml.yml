# Project's properties
project:
   title: Formal Methods Working Group Example
   description: Entailments demonstration for SysmL v2 FMWG
   group: io.opencaesar
   version: 0.1.0

# Maven repositories
repositories:
   - https://repo.maven.apache.org/maven2

# Maven dependencies
dependencies:
   - io.opencaesar.ontologies:core-vocabularies:5.+

# Project's datasets
datasets:
   formal-methods-wg-example: # configured in fuseki.ttl
      label: Formal Methods Working Group Example
      description: This is an OML example dataset
      iri: http://opencaesar.io/formal-methods-wg-example/description/bundle
      sources: [ 'src/oml' ]
      queries: src/sparql
